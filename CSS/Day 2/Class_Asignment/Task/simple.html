<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>
</head>

<body style="margin:0; font-family:Arial; background:#f4f4f4;">

<!-- NAVBAR -->
<div style="
  display:flex;
  justify-content: space-between;
  align-items: center;
  padding:10px 20px;
  background:#2c3e50;
  color:white;
">

  <!-- LEFT -->
  <div style="display:flex; gap:20px; align-items:center;">
    
    <img src="download (12).jpeg" style="border-radius:50%; width:40px;">
    <div style="cursor:pointer;">HOME</div>
    <div style="cursor:pointer;">CONTACT</div>
  </div>

  <!-- CENTER (UPDATED) -->
  <div style="
    display:flex;
    align-items:center;
    background:white;
    padding:5px 10px;
    border-radius:20px;
  ">
    
    
    <input 
      type="text" 
      placeholder="Search..." 
      style="
        border:none;
        outline:none;
      "
    />
    <span style="color:black; margin-right:5px;">🔍</span>
  </div>

  <!-- RIGHT -->
  <div style="display:flex; gap:10px; align-items:center;">
    
    <img src="download (12).jpeg" style="border-radius:50%; width:40px;">
    
    <div style="
      background:#e74c3c;
      padding:6px 12px;
      border-radius:15px;
      cursor:pointer;
    ">
      Logout
    </div>
  </div>

</div>

</body>
</html>
